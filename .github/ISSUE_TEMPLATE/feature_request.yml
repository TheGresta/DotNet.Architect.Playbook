name: 🚀 Feature Request
description: Propose a new feature or improvement for this project.
title: "[FEAT]: <Short Title>"
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ### Thanks for contributing! 
        Please provide as much detail as possible so we can evaluate this request.
  - type: textarea
    id: problem
    attributes:
      label: 🔍 Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: "e.g. I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: ✨ Proposed Solution
      description: Describe the solution you'd like to see.
      placeholder: "I would like the app to automatically..."
    validations:
      required: true
  - type: textarea
    id: technical-details
    attributes:
      label: 🛠️ Technical Implementation (Optional)
      description: If you have a specific implementation in mind (API endpoints, DB changes), list them here.
  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Requirements Checklist
      options:
        - label: This is a new feature, not a bug fix.
          required: true
        - label: I have checked existing issues to ensure this isn't a duplicate.
          required: true
        - label: This change follows the project's architecture.
          required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 🧪 Alternatives Considered
      description: Any alternative solutions or features you've considered.
