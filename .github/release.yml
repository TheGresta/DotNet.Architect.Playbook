changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: "🚀 New Features"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - bug
    - title: "🧹 Maintenance"
      labels:
        - chore
        - refactor
    - title: "📝 Documentation"
      labels:
        - documentation
