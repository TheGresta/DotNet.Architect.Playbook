name: "🚀 Automated Semantic Release"

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Setting persist-credentials to true (default) 
          # allows the bot to push the CHANGELOG commit back.
          persist-credentials: true 

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: 🚀 Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          # We must tell the action to install these extra plugins 
          # so they are available when the .releaserc runs.
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
