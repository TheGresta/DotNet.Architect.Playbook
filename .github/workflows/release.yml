name: "🚀 Automated Semantic Release"

on:
  push:
    branches:
      - main  # Triggers every time you merge a PR into main

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release # Prevents double-deployments
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: 🚀 Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # This plugin handles the versioning and the notes
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
