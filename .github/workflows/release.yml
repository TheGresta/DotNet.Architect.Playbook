name: "🚀 Auto Release"

on:
  push:
    tags:
      - "v*.*.*" # Triggers when you push a tag like v1.0.0

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: Allows the bot to create the release
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for accurate changelogs

      - name: 🏷️ Generate Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true # This is the "Magic" - it reads your PRs/Commits
          draft: false
          prerelease: false
          name: "Release ${{ github.ref_name }}"
          body: |
            ## 📝 What's Changed in this Version
            *Automatic summary generated from PRs and Commits.*
