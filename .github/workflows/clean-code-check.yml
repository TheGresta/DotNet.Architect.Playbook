name: "🧼 Clean Code Check"
on: [pull_request]

jobs:
  enforce-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🏗️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🔎 Verify Naming and Analyzers
        # We target specific IDs to ignore the "shitty" formatting/import errors:
        # IDE1006: Naming Styles (Interfaces with I, private fields with _)
        # CA1822: Mark members as static
        # CA1823: Avoid unused private fields
        run: |
          dotnet format --verify-no-changes --no-restore --severity error --diagnostics IDE1006 CA1822 CA1823
