name: "🧼 Clean Code Check"
on: [pull_request]

jobs:
  enforce-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🏗️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 📦 Restore Dependencies
        # Essential: Analyzers need to resolve types to validate naming/imports correctly
        run: dotnet restore

      - name: 🔎 Verify Naming and Analyzers
        # We check all rules, but your .editorconfig (below) silences the ones you hate
        run: dotnet format --verify-no-changes --severity error
